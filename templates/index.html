<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="bg-indigo-600 p-8 text-white">
            <h1 class="text-3xl font-bold tracking-tight">Daily Tasks</h1>
            <p id="counter" class="text-indigo-200 mt-1 text-sm font-medium">Loading tasks...</p>
        </div>

        <div class="p-6 bg-white border-b border-gray-100">
            <div class="flex gap-3">
                <input type="text" id="taskInput" 
                    class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-gray-700"
                    placeholder="What's on your mind?">
                <button onclick="addTask()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-200 active:scale-95">
                    Add
                </button>
            </div>
        </div>

        <ul id="taskList" class="divide-y divide-gray-50 max-h-[400px] overflow-y-auto">
            </ul>
    </div>

    <script>
        // Update the Task Counter
        function updateCounter(count) {
            const counter = document.getElementById('counter');
            counter.innerText = count === 1 ? '1 task remaining' : `${count} tasks remaining`;
        }

        async function loadTasks() {
            const list = document.getElementById('taskList');
            try {
                const res = await fetch('/tasks');
                const tasks = await res.json();
                
                updateCounter(tasks.length);

                if (tasks.length === 0) {
                    list.innerHTML = `
                        <div class="p-12 text-center">
                            <p class="text-gray-400">All caught up! 🎉</p>
                        </div>`;
                    return;
                }

                list.innerHTML = tasks.map(t => `
                    <li class="p-5 flex items-center justify-between hover:bg-gray-50 transition-all group fade-in">
                        <div class="flex items-center gap-4">
                            <div class="w-2.5 h-2.5 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(79,70,229,0.4)]"></div>
                            <span class="text-gray-700 font-semibold">${t.title}</span>
                        </div>
                        <button onclick="deleteTask(${t.id})" 
                            class="text-gray-300 hover:text-red-500 transition-colors p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </li>
                `).join('');
            } catch (err) {
                list.innerHTML = '<li class="p-6 text-center text-red-500 font-medium">Server Connection Error</li>';
            }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;

            await fetch('/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value })
            });

            input.value = '';
            loadTasks();
        }

       async function deleteTask(id) {
    // Send the DELETE request to the server
    const res = await fetch(`/tasks/${id}`, {
        method: 'DELETE'
    });

    if (res.ok) {
        // Refresh the list after deleting
        loadTasks();
    } else {
        alert("Failed to delete the task.");
    }
}

        loadTasks();
    </script>
</body>
</html>
